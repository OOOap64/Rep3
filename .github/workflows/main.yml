name: CI
on: 
  push:
    branches:
      -main
jobs:
  import:
    runs-on: ubunut-latest
    container:
      image: app:1
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13' 
      - run: pip install flask Flask-JWT-Extended bcrypt

