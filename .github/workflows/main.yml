name: CI
on: 
  push:
    branches:
      -main
jobs:
  import:
    runs-on: ubunut-latest
    strategy:
      matrix:
       versions : ["3.14", "3.13", "3.12"] 
    container:
      image: app:1
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.versions }} 
      - run: pip install flask Flask-JWT-Extended bcrypt

